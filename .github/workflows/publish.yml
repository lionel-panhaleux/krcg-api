name: Publish

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Build
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  release:
    name: Create GitHub release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create release
        run: gh release create "${{ github.ref_name }}" --notes-file CHANGES.md
        env:
          GH_TOKEN: ${{ github.token }}

      # a release created with the workflow token does not emit a workflow
      # event (GitHub anti-recursion rule), so deploy.yml's `release` trigger
      # never fires from here — dispatch it explicitly (dispatch is exempt)
      - name: Trigger deploy
        run: gh workflow run deploy.yml --ref "${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ github.token }}
